apiVersion: apps/v1
kind: Deployment
metadata:
  name: feline-registry
  labels:
    app: feline-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feline-registry
  template:
    metadata:
      labels:
        app: feline-registry
    spec:
      containers:
        - name: feline-registry
          image: ghcr.io/vybraan/feline-registry:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
